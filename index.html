    // 应用程序主对象 - 统一管理所有功能
    const App = {
      // 当前语言
      currentLang: 'zh',
      
      // 初始化应用
      init() {
        this.detectLanguage();
        this.initEventListeners();
        this.setDates();
        this.setupICP();
        this.initEnhancements();
      },

      // 初始化增强功能
      initEnhancements() {
        this.addHoverEffects();
        this.addScrollAnimations();
        this.setupParallax();
      },

      // 添加悬停效果
      addHoverEffects() {
        // 为主内容区域添加鼠标跟踪效果
        const mainContent = document.querySelector('.main-content');
        if (mainContent) {
          mainContent.addEventListener('mousemove', (e) => {
            const rect = mainContent.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            
            const rotateX = (y - 0.5) * 10;
            const rotateY = (x - 0.5) * -10;
            
            mainContent.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
          });
          
          mainContent.addEventListener('mouseleave', () => {
            mainContent.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px)';
          });
        }
      },

      // 添加滚动动画
      addScrollAnimations() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.style.opacity = '1';
              entry.target.style.transform = 'translateY(0)';
            }
          });
        });

        document.querySelectorAll('.main-content, .main-shici').forEach((el) => {
          el.style.opacity = '0';
          el.style.transform = 'translateY(30px)';
          el.style.transition = 'all 0.8s ease';
          observer.observe(el);
        });
      },

      // 设置视差效果
      setupParallax() {
        window.addEventListener('scroll', () => {
          const scrolled = window.pageYOffset;
          const parallax = document.querySelector('.container');
          if (parallax) {
            const speed = scrolled * 0.5;
            parallax.style.transform = `translateY(${speed}px)`;
          }
        });
      },

      // 语言检测和初始化
      detectLanguage() {
        const userLanguage = navigator.language || navigator.userLanguage;
        const savedLang = localStorage.getItem("oldlang2024");
        
        if (savedLang) {
          this.changeLang(savedLang);
        } else {
          const lang = userLanguage.indexOf("zh") > -1 ? "zh" : "en";
          this.changeLang(lang);
        }
      },

      // 切换语言（用户操作）
      changeLangUser(lang) {
        localStorage.setItem("oldlang2024", lang);
        this.changeLang(lang);
      },

      // 切换语言（内部方法）
      changeLang(lang) {
        this.currentLang = lang;
        this.updateLanguageButtons(lang);
        this.updatePageContent();
      },

      // 更新语言按钮显示
      updateLanguageButtons(lang) {
        Utils.toggleElementDisplay("#translate_en", lang === "zh");
        Utils.toggleElementDisplay("#translate_cn", lang === "en");
      },

      // 更新页面内容
      updatePageContent() {
        const config = DataManager.getConfig(this.currentLang);
        
        // 更新页面元素
        document.title = config.title;
        Utils.setElementContent("#welcome", config.welcome);
        Utils.setElementContent("#go2blogwork", config.go2blogwork);
        Utils.setElementContent("#meirishici", config.meirishici);
        
        // 更新诗词内容
        this.displayRandomPoem();
      },

      // 显示随机诗词
      displayRandomPoem() {
        const poems = DataManager.getPoems(this.currentLang);
        const randomPoem = Utils.getRandomElement(poems);
        const articleDiv = document.querySelector("section.article");
        
        if (articleDiv) {
          articleDiv.style.display = "inherit";
          articleDiv.innerHTML = "";
          
          randomPoem.item.forEach((text, index) => {
            const p = document.createElement("p");
            p.innerText = index === 0 ? randomPoem.title : text;
            articleDiv.appendChild(p);
          });
        }
      },

      // 设置日期显示
      setDates() {
        const dateText = "📅" + Utils.getFormattedDate();
        Utils.setElementText("#currentDate", dateText);
        Utils.setElementText("#currentDate2", dateText);
        
        // 添加时间问候
        this.setTimeGreeting();
      },

      // 设置时间问候
      setTimeGreeting() {
        const hour = new Date().getHours();
        const config = DataManager.getConfig(this.currentLang);
        let greeting = '';
        
        if (hour >= 5 && hour < 12) {
          greeting = config.greetings.morning;
        } else if (hour >= 12 && hour < 18) {
          greeting = config.greetings.afternoon;
        } else if (hour >= 18 && hour < 22) {
          greeting = config.greetings.evening;
        } else {
          greeting = config.greetings.night;
        }
        
        const welcomeElement = document.querySelector('#welcome');
        if (welcomeElement) {
          const baseWelcome = this.currentLang === 'zh' ? '🧙欢迎光临 Harry Work🤗' : '🧙Welcome to Harry Work🤗';
          welcomeElement.innerHTML = `${greeting}, ${baseWelcome}`;
        }
      },

      // 设置ICP信息
      setupICP() {
        const icpElement = document.querySelector("#icpdom");
        if (icpElement) {
          icpElement.innerHTML = "@Power By Harry Work";
        }
      },

      // 初始化事件监听器
      initEventListeners() {
        // 博客和应用链接点击事件
        document.querySelectorAll("#go2blogwork a").forEach(link => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            const part = link.getAttribute("data-qianzhui");
            const newHost = window.location.host.replace("www", part);
            const baseUrl = window.location.protocol + "//" + newHost;
            window.open(baseUrl, "_blank");
          });
        });
      },
    };

    // 工具函数集合
    const Utils = {
      // 获取当前日期格式化
      getFormattedDate() {
        const date = new Date();
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      },

      // 设置元素内容
      setElementContent(selector, content) {
        const element = document.querySelector(selector);
        if (element) element.innerHTML = content;
      },

      // 设置元素文本
      setElementText(selector, text) {
        const element = document.querySelector(selector);
        if (element) element.innerText = text;
      },

      // 显示/隐藏元素
      toggleElementDisplay(selector, isVisible) {
        const element = document.querySelector(selector);
        if (element) element.style.display = isVisible ? 'inherit' : 'none';
      },

      // 随机选择数组元素
      getRandomElement(array) {
        return array[Math.floor(Math.random() * array.length)];
      }
    };

    // 数据管理器
    const DataManager = {
      // 获取诗词数据
      getPoems(lang = 'zh') {
        return this.poems[lang] || this.poems.zh;
      },

      // 获取配置数据
      getConfig(lang = 'zh') {
        return this.config[lang] || this.config.zh;
      },

      // 诗词数据
      poems: {
        zh: [
          {
            title: "诫子书",

              "夫君子之行，静以修身，俭以养德。非淡泊无以明志，非宁静无以致远。夫学须静也，才须学也，非学无以广才，非志无以成学。",
              "淫慢则不能励精，险躁则不能治性。年与时驰，意与日去，遂成枯落，多不接世，悲守穷庐，将复何及",
            ],
          },
          {
            title: "行路难 李白",
            item: [
              "金樽清酒斗十千，玉盘珍羞直万钱。",
              "停杯投箸不能食，拔剑四顾心茫然。",
              "闲来垂钓碧溪上，忽复乘舟梦日边。",
              "行路难，行路难，多歧路，今安在？",
              "长风破浪会有时，直挂云帆济沧海。",
            ],
          },
          {
            title: "浪淘沙·北戴河",
            item: [
              "大雨落幽燕，白浪滔天，秦皇岛外打鱼船。一片汪洋都不见，知向谁边？",
              "往事越千年，魏武挥鞭，东临碣石有遗篇。萧瑟秋风今又是，换了人间。",
            ],
          },
          {
            title: "水调歌头·游泳",
            item: [
              "才饮长沙水，又食武昌鱼。万里长江横渡，极目楚天舒。不管风吹浪打，胜似闲庭信步，今日得宽馀。子在川上曰：逝者如斯夫！",
              "风樯动，龟蛇静，起宏图。一桥飞架南北，天堑变通途。更立西江石壁，截断巫山云雨，高峡出平湖。神女应无恙，当惊世界殊。",
            ],
          },
          {
            title: "采桑子·重阳",
            item: [
              "人生易老天难老，岁岁重阳。今又重阳，战地黄花分外香。",

            ],
          },
          {

            item: [
              "东风夜放花千树，更吹落、星如雨。宝马雕车香满路。凤箫声动，玉壶光转，一夜鱼龙舞。",
